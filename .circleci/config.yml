version: 2.1
jobs:
  build:
    docker:
      - image: 218546966473.dkr.ecr.us-east-1.amazonaws.com/circle-ci:stitch-tap-tester-uv
    steps:
      - checkout
      - run:
          name: 'Setup virtual env'
          command: |
            uv venv --python 3.12 /usr/local/share/virtualenvs/tap-ringcentral
            source /usr/local/share/virtualenvs/tap-ringcentral/bin/activate
            uv pip install -U pip setuptools
            uv pip install .
      - add_ssh_keys
      - run:
          name: 'JSON Validator'
          command: |
            source /usr/local/share/virtualenvs/tap-tester/bin/activate
            stitch-validate-json tap_ringcentral/schemas/*.json
      - run:
          name: 'Unit Tests + Integration Tests'
          command: |
            source /usr/local/share/virtualenvs/tap-ringcentral/bin/activate
            python -m unittest discover -s tests -v
workflows:
  version: 2
  commit:
    jobs:
      - build:
          context: circleci-user
  build_daily:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build:
          context: circleci-user
